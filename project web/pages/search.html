    <link rel="stylesheet" href="../css/search.css">
    <link rel="stylesheet" href="../css/navbar.css">
</head>
<body>

    <header>

        <nav>

            <div class="logo">

                <i class="fa-solid fa-house"></i>

                <span>Mughtarib</span>

            </div>

            <ul>

                <li><a href="../index.html" >Home</a></li>

                <li><a href="../pages/search.html" class="active">Search</a></li>

                <li><a href="../pages/housing.html">Housing</a></li>

                <li><a href="#about">About</a></li>

                <li><a href="#features">Features</a></li>

                <li><a href="#contact">Contact</a></li>

            </ul>

            <a href="../pages/login.html" class="login-btn">

                Login

            </a>

        </nav>

    </header>
    <main class="search-page">
    <div class="search-container">
        <h2> البحث المتقدم</h2>
        
        <form id="searchForm" class="search-form">
            <div class="form-group">
                <label for="governorate">المحافظة:</label>
                <select id="governorate" name="governorate" required>
                    <option value="">اختر المحافظة...</option>
                    <option value="minya">المنيا</option>
                    <option value="assiut">أسيوط</option>
                    <option value="beni-suef">بني سويف</option>
                    <option value="cairo">القاهرة</option>
                    <option value="alexandria">الإسكندرية</option>
                </select>
            </div>

            <div class="form-group">
                <label for="university">الجامعة:</label>
                <select id="university" name="university">
                    <option value="">اختر الجامعة...</option>
                    <option value="minya-uni">جامعة المنيا</option>
                    <option value="assiut-uni">جامعة أسيوط</option>
                    <option value="bsu-uni">جامعة بني سويف</option>
                    <option value="cairo-uni">جامعة القاهرة</option>
                    <option value="alex-uni">جامعة الإسكندرية</option>
                </select>
            </div>

            <div class="form-group">
                <label for="type">النوع:</label>
                <select id="type" name="type">
                    <option value="">الكل</option>
                    <option value="male">ذكور</option>
                    <option value="female">إناث</option>
                </select>
            </div>

            <div class="form-group budget-group">
                <label for="budget">الميزانية: <span id="budgetValue">5000</span> EGP</label>
                <input type="range" id="budget" name="budget" min="1000" max="20000" step="500" value="5000" oninput="document.getElementById('budgetValue').innerText = this.value">
                <div class="range-labels">
                    <span>500 EGP</span>
                    <span>20000 EGP</span>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-search">تطبيق الفلاتر </button>
                <button type="reset" class="btn-reset">إعادة تعيين </button>
            </div>
        </form>

        <div id="searchResults" class="results-container">
            </div>
    </div>
    </main>
    <script src="../js/search.js"></script>
</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Mughtarib</title>

    <link rel="stylesheet" href="../css/login.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>

    <div class="container">

        <a href="../index.html" class="back-home">
            <i class="fa-solid fa-house"></i>
            العودة للرئيسية
        </a>

        <div class="logo">

            <i class="fa-solid fa-house"></i>

            <h2>Mughtarib</h2>

            <p>منصة تساعد الطلاب في العثور على السكن المناسب</p>

        </div>

        <div class="tabs">

            <div class="tab active" id="loginTab">
                تسجيل الدخول
            </div>

            <div class="tab" id="registerTab">
                إنشاء حساب
            </div>

        </div>

        <!-- ================= Login ================= -->

        <div class="login-form" id="loginForm">

            <h3>تسجيل الدخول</h3>

            <label>نوع الحساب</label>

            <div class="user-type">

                <label>
                    <input type="radio" name="loginRole" value="student" checked>
                    طالب
                </label>

                <label>
                    <input type="radio" name="loginRole" value="owner">
                    صاحب سكن
                </label>

            </div>

            <input type="email" placeholder="البريد الإلكتروني">

            <input type="password" placeholder="كلمة المرور">

            <button type="button" class="btn">
                تسجيل الدخول
            </button>

            <a href="#" class="forgot">
                نسيت كلمة المرور؟
            </a>

        </div>

        <!-- ================= Register ================= -->

        <div class="register-form" id="registerForm">

            <h3>إنشاء حساب</h3>

            <label>نوع الحساب</label>

            <div class="user-type">

                <label>
                    <input type="radio" name="registerRole" value="student" checked>
                    طالب
                </label>

                <label>
                    <input type="radio" name="registerRole" value="owner">
                    صاحب سكن
                </label>

            </div>

            <input type="text" placeholder="الاسم بالكامل">

            <input type="email" placeholder="البريد الإلكتروني">

            <input type="password" placeholder="كلمة المرور">

            <input type="password" placeholder="تأكيد كلمة المرور">

            <button type="button" id="registerBtn" class="btn">
                إنشاء حساب جديد
            </button>

        </div>

    </div>

    <script src="../js/login.js"></script>

</body>

</html>
